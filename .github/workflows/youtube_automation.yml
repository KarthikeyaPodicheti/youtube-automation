name: YouTube Automation

on:
  schedule:
    # 3 uploads per day (IST times)
    - cron: '0 5 * * *'    # 10:30 AM IST
    - cron: '30 8 * * *'   # 2:00 PM IST
    - cron: '0 16 * * *'   # 9:30 PM IST
  workflow_dispatch:       # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decode credentials from GitHub Secrets
        run: |
          python3 << 'EOF'
          import base64, os, sys

          errors = []

          # Decode GOOGLE_CLIENT_SECRET → client_secret.json
          client_secret = os.environ.get("GOOGLE_CLIENT_SECRET", "").strip()
          if not client_secret:
              errors.append("❌ GOOGLE_CLIENT_SECRET secret is missing!")
          else:
              with open("client_secret.json", "wb") as f:
                  f.write(base64.b64decode(client_secret))
              print("✅ client_secret.json written")

          # Decode GOOGLE_TOKEN → token.pickle (YouTube OAuth)
          token = os.environ.get("GOOGLE_TOKEN", "").strip()
          if not token:
              errors.append("❌ GOOGLE_TOKEN secret is missing!")
          else:
              with open("token.pickle", "wb") as f:
                  f.write(base64.b64decode(token))
              print("✅ token.pickle written")

          # google_service_account.json is already in the repo — no decode needed
          print("✅ google_service_account.json already present in repo")

          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          EOF
        env:
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_TOKEN:          ${{ secrets.GOOGLE_TOKEN }}


      - name: Run upload script
        run: python upload_scheduled.py

      - name: Commit updated tracking files and refreshed token
        run: |
          git config --local user.email "youtube-automation@github.com"
          git config --local user.name "YouTube Automation Bot"
          git add processed_videos.json upload_history.json daily_upload_count.json token.pickle || true
          git diff --cached --quiet || git commit -m "🤖 Upload tracking update [skip ci]"
          git push || true
